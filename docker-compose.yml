services:
  # ── Local PostgreSQL (mirrors Supabase schema for offline dev) ─────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backtester
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── FastAPI backtesting microservice ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/backtester
    depends_on:
      - db
    volumes:
      - ./backend:/app   # hot-reload in dev

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/backtester
      - DIRECT_URL=postgresql://postgres:postgres@db:5432/backtester
      - BACKEND_URL=http://backend:8000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
    depends_on:
      - db
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm ci && npx prisma migrate deploy && npm run dev -- --hostname 0.0.0.0"

volumes:
  postgres_data:
  frontend_node_modules:
